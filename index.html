<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<title>Entering CircleLytics</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  overflow: hidden;
  font-family: 'Inter', sans-serif;
  background: #05070f;
  color: #e6edf3;
}

/* CANVAS */
canvas {
  position: fixed;
  inset: 0;
}

/* UI */
.overlay {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 10;
}

.panel {
  backdrop-filter: blur(30px);
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 24px;
  padding: 40px;
  max-width: 520px;
  text-align: center;
  box-shadow: 0 30px 80px rgba(0,0,0,0.5);
}

/* LOGO */
.logo {
  width: 140px;
  margin-bottom: 20px;
  opacity: 0.9;
}

/* TEXT */
h1 {
  font-weight: 400;
  font-size: 1.8rem;
  margin-bottom: 10px;
}

.tagline {
  color: #7dd3fc;
  font-size: 0.95rem;
  margin-bottom: 15px;
}

p {
  color: #9aa6b2;
  line-height: 1.6;
}

.btn {
  margin-top: 20px;
  display: inline-block;
  padding: 12px 22px;
  border-radius: 999px;
  background: rgba(125,211,252,0.15);
  color: #7dd3fc;
  text-decoration: none;
  transition: 0.3s;
}

.btn:hover {
  background: rgba(125,211,252,0.3);
}

.timer {
  margin-top: 15px;
  font-size: 0.9rem;
  color: #7c8aa0;
}
</style>
</head>

<body>

<div class="overlay">
  <div class="panel">
    
    <!-- LOGO (auto from site) -->
    <img src="https://www.circlelytics.com/img/logo.svg" class="logo">

    <h1>Alternate Entry Point</h1>

    <div class="tagline">
      Unlock Collective Intelligence
    </div>

    <p>
      You’ve entered CircleLytics through a secondary gateway.  
      We’re seamlessly connecting you to the official platform  
      where diverse perspectives converge into meaningful insight.
    </p>

    <a href="https://circlelytics.com" class="btn">
      Enter Official Platform
    </a>

    <div class="timer">
      Redirecting within few seconds
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>

<script>
/* SCENE */
const scene = new THREE.Scene();
scene.fog = new THREE.Fog(0x05070f, 4, 12);

const camera = new THREE.PerspectiveCamera(60, innerWidth/innerHeight, 0.1, 100);
camera.position.z = 5;

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(devicePixelRatio);
document.body.appendChild(renderer.domElement);

/* LIGHT */
const light1 = new THREE.PointLight(0x7dd3fc, 2);
light1.position.set(5,5,5);
scene.add(light1);

const light2 = new THREE.PointLight(0x1d4ed8, 2);
light2.position.set(-5,-5,-5);
scene.add(light2);

/* CORE BLOB */
const geo = new THREE.IcosahedronGeometry(1.6, 64);

const mat = new THREE.MeshPhysicalMaterial({
  color: 0x60a5fa,
  roughness: 0.1,
  metalness: 0.3,
  transmission: 0.4,
  thickness: 0.8,
  clearcoat: 1
});

const blob = new THREE.Mesh(geo, mat);
scene.add(blob);

/* VERTEX MORPH */
const pos = geo.attributes.position;
const original = pos.array.slice();

function animateBlob(t) {
  for (let i = 0; i < pos.count; i++) {
    let ix = i * 3;

    let x = original[ix];
    let y = original[ix+1];
    let z = original[ix+2];

    let noise =
      Math.sin(t + x*3) +
      Math.sin(t + y*3) +
      Math.sin(t + z*3);

    noise *= 0.08;

    pos.array[ix] = x + noise;
    pos.array[ix+1] = y + noise;
    pos.array[ix+2] = z + noise;
  }

  pos.needsUpdate = true;
  geo.computeVertexNormals();
}

/* PARTICLES */
const starsGeo = new THREE.BufferGeometry();
const starCount = 2000;
const arr = new Float32Array(starCount * 3);

for (let i = 0; i < starCount * 3; i++) {
  arr[i] = (Math.random() - 0.5) * 20;
}

starsGeo.setAttribute('position', new THREE.BufferAttribute(arr, 3));

const starsMat = new THREE.PointsMaterial({
  color: 0x7dd3fc,
  size: 0.015,
  transparent: true,
  opacity: 0.6
});

const stars = new THREE.Points(starsGeo, starsMat);
scene.add(stars);

/* INTERACTION */
let mx = 0, my = 0;

document.addEventListener("mousemove", e => {
  mx = (e.clientX / innerWidth - 0.5) * 2;
  my = (e.clientY / innerHeight - 0.5) * 2;
});

/* LOOP */
function animate(t) {
  requestAnimationFrame(animate);

  animateBlob(t * 0.001);

  blob.rotation.y += 0.002;
  blob.rotation.x += 0.001;

  camera.position.x += (mx * 1.5 - camera.position.x) * 0.05;
  camera.position.y += (-my * 1.5 - camera.position.y) * 0.05;
  camera.lookAt(scene.position);

  stars.rotation.y += 0.0004;

  renderer.render(scene, camera);
}

animate();

/* RESIZE */
addEventListener("resize", () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

/* REDIRECT */
let t = 15;
const el = document.getElementById("t");

setInterval(() => {
  t--;
  el.textContent = t;
  if (t <= 0) location.href = "https://circlelytics.com";
}, 1500);
</script>

</body>
</html>
